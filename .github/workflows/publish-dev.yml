name: Publish to GitHub Packages (dev)

on:
  push:
    branches: [dev]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish AAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :lib:publishReleasePublicationToGitHubPackagesRepository --no-configuration-cache
